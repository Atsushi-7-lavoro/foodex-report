  h+='<div class="svg-wrap"><svg><line x1="0" y1="50%" x2="50%" y2="50%" stroke="rgba(0,0,0,0.15)" stroke-width="2"/><line x1="50%" y1="16.67%" x2="50%" y2="83.33%" stroke="rgba(0,0,0,0.15)" stroke-width="2"/><line x1="50%" y1="16.67%" x2="100%" y2="16.67%" stroke="rgba(0,0,0,0.15)" stroke-width="2"/><line x1="50%" y1="50%" x2="100%" y2="50%" stroke="rgba(0,0,0,0.15)" stroke-width="2"/><line x1="50%" y1="83.33%" x2="100%" y2="83.33%" stroke="rgba(0,0,0,0.15)" stroke-width="2"/></svg></div>';
  h+='<div class="right-cards"><div class="right-card"><div class="right-num" style="color:#2E8B57">'+c.a+'</div><div class="right-label">アナナスジャパン向け\n商品</div></div>';
  h+='<div class="right-card"><div class="right-num" style="color:#888">'+c.s+'</div><div class="right-label">侍ファクトリー向け\n商品</div></div>';
  h+='<div class="right-card"><div class="right-num" style="color:#CE2B37">'+c.o+'</div><div class="right-label">その他商品・サービス</div></div></div></div>';
  h+='<h2 class="section">2. カテゴリー</h2><div class="sticky-bar"><div class="filter-row"><span class="filter-label">フィルター:</span>';
  FILTERS.forEach(function(f){h+='<button class="fbtn'+(af.indexOf(f.k)>=0?" on":"")+'" onclick="TF(\''+f.k+'\')">'+E(f.l)+"</button>"});
  h+="</div><div class=\"prow\"><span class=\"plabel\">優先度:</span><div class=\"swrap\">";
  h+='<input type="range" class="pslider" min="0" max="5" value="'+pf+'" oninput="SP(this.value)" style="background:linear-gradient(to right,'+pc+" "+(pf*20)+"%,rgba(0,0,0,0.08) "+(pf*20)+'%)">';
  h+="<style>.pslider::-webkit-slider-thumb{background:"+pc+"}.pslider::-moz-range-thumb{background:"+pc+"}</style>";
  h+='<div class="sticks"><span class="stick" style="color:rgba(0,0,0,0.25)">ALL</span>';
  for(var i=1;i<=5;i++)h+='<span class="stick" style="color:'+(pf>=i?pc:"rgba(0,0,0,0.2)")+'">'+i+"</span>";
  h+="</div></div></div></div>";
  h+='<h2 class="section">3. 企業情報</h2>';
  if(em)h+='<div class="dz" id="card-drop"><span class="dzi">📇</span><span class="dzt">名刺画像をここにドロップ</span>'+(S.uploading?'<span class="dzld">📡 読み取り中...</span>':"")+"</div>";
  var fc=S.cl.filter(function(co){var t=co.tags||[];var mt=af.indexOf("all")>=0||af.some(function(f){return t.indexOf(f)>=0});var mp=pf===0||(co.priority||0)===pf;return mt&&mp});
  fc.forEach(function(co){
    h+='<div class="cd"><div class="cdh"><div class="cdn">'+co.id+'</div><div class="cdnm">'+E(co.company)+"</div>";
    if(em)h+='<button class="cddel" onclick="DC('+co.id+')">削除</button>';
    h+="</div>";
    if(em){
      h+='<div class="cdf"><span style="font-size:10px;color:rgba(0,0,0,0.35);font-weight:600;margin-right:2px">フィルター:</span>';
      FILTERS.forEach(function(f){if(f.k==="all")return;var t=co.tags||[];h+='<button class="cfb'+(t.indexOf(f.k)>=0?" on":"")+'" onclick="CT('+co.id+",'"+f.k+"')\">"+E(f.l)+"</button>"});
      h+="</div><div class=\"cdp\"><span style=\"font-size:11px;color:rgba(0,0,0,0.35);font-weight:600;margin-right:2px\">優先度:</span>";
      for(var i=1;i<=5;i++){var a=(co.priority||0)===i;h+='<span class="pn" style="'+(a?"background:"+PC[i]+";color:#fff;border:none":"")+'" onclick="CP('+co.id+","+i+')">'+i+"</span>"}
      h+="</div>";
    }
    h+='<div class="cdd">';
    [{l:"主な取扱商品（サービス）",v:co.products||"-"},{l:"所在国",v:co.country||"-"},{l:"URL",v:co.hp||"-",k:!!co.hp},{l:"担当者",v:co.contact||"-"},{l:"TEL",v:co.tel||"-"},{l:"e-mail",v:co.email||"-",k:!!co.email}].forEach(function(r){
      h+='<span class="dl">'+E(r.l)+'</span><span class="dv'+(r.k?" dvl":"")+'">'+E(r.v)+"</span>"});
    h+="</div></div>"
  });
  h+='<h2 class="section">4. 画像</h2>';
  if(em)h+='<div class="dz" id="gallery-drop"><span class="dzi">📂</span><span class="dzt">画像をここにドロップ</span></div>';
  if(S.gl.length){h+='<div class="gg">';S.gl.forEach(function(img,i){h+='<div class="gi" onclick="OL('+i+')"><img src="'+img.src+'">';if(em)h+='<button class="gd" onclick="event.stopPropagation();DG('+i+')">×</button>';h+="</div>"});h+="</div>"}
  h+='<div class="ft"><p>© ANANAS Japan Co., Ltd.</p><p>- Confidential and Proprietary -</p></div></div>';
  if(S.lbi!==null&&S.gl[S.lbi]){var li=S.lbi,gl=S.gl.length;h+='<div class="lb" onclick="CL()"><button class="lbb" style="left:16px" onclick="event.stopPropagation();LP()">‹</button><img class="lbi" src="'+S.gl[li].src+'" onclick="event.stopPropagation()"><button class="lbb" style="right:16px" onclick="event.stopPropagation();LN()">›</button><button class="lbc" onclick="CL()">×</button><div class="lbcn">'+(li+1)+" / "+gl+"</div></div>"}
  if(S.showPw){h+='<div class="mbg" onclick="CPW()"><div class="mbox" onclick="event.stopPropagation()"><p class="mt">編集パスワードを入力</p><input class="mi'+(S.pwErr?" err":"")+'" type="password" id="pwi" placeholder="パスワード" onkeydown="if(event.key===\'Enter\')CK()">'+(S.pwErr?'<p class="merr">パスワードが正しくありません</p>':"")+'<div class="mbtns"><button class="mcan" onclick="CPW()">キャンセル</button><button class="mok" onclick="CK()">確認</button></div></div></div>'}
  document.getElementById("app").innerHTML=h;
  if(S.showPw){var p=document.getElementById("pwi");if(p)p.focus()}
}
// Event delegation for drag & drop (attached once, never lost)
document.addEventListener("dragover",function(e){
  var t=e.target.closest("#card-drop,#gallery-drop");
  if(t){e.preventDefault();t.classList.add("over")}
});
document.addEventListener("dragleave",function(e){
  var t=e.target.closest("#card-drop,#gallery-drop");
  if(t){e.preventDefault();t.classList.remove("over")}
});
document.addEventListener("drop",function(e){
  var cd=e.target.closest("#card-drop");
  var gd=e.target.closest("#gallery-drop");
  if(cd){e.preventDefault();cd.classList.remove("over");hcd(e);}
  else if(gd){e.preventDefault();gd.classList.remove("over");hgd(e);}
});
function TM(){if(S.editMode){S.editMode=false;R()}else{S.showPw=true;S.pwErr=false;R()}}
function CPW(){S.showPw=false;R()}
function CK(){var p=document.getElementById("pwi");if(p&&p.value===PW){S.editMode=true;S.showPw=false}else S.pwErr=true;R()}
function TF(k){if(k==="all")S.af=["all"];else{var a=S.af.filter(function(x){return x!=="all"});var i=a.indexOf(k);if(i>=0)a.splice(i,1);else a.push(k);S.af=a.length?a:["all"]}R()}
function SP(v){S.pf=parseInt(v);R()}
function DC(id){S.cl=S.cl.filter(function(c){return c.id!==id});for(var i=0;i<S.cl.length;i++)S.cl[i].id=i+1;sv();R()}
function CT(id,k){S.cl.forEach(function(c){if(c.id!==id)return;var t=c.tags||[];var i=t.indexOf(k);if(i>=0)t.splice(i,1);else t.push(k);c.tags=t});sv();R()}
function CP(id,n){S.cl.forEach(function(c){if(c.id===id)c.priority=c.priority===n?0:n});sv();R()}
function OL(i){S.lbi=i;R()}
function CL(){S.lbi=null;R()}
function LP(){S.lbi=S.lbi>0?S.lbi-1:S.gl.length-1;R()}
function LN(){S.lbi=S.lbi<S.gl.length-1?S.lbi+1:0;R()}
function DG(i){S.gl.splice(i,1);sg();R()}
loadDB();
</script>
